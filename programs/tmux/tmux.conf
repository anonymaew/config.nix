# ─── General settings ──────────────────────────────────
set -g status-position top
set -g status-justify absolute-centre
set -g renumber-windows on
set -g set-clipboard on
set -g extended-keys on
set -g extended-keys-format csi-u
set -g allow-passthrough on

set -g status-style 'bg=default'
setw -g window-status-style 'fg=color7'
setw -g window-status-format ' #I:#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{?#{==:#{pane_current_command},nvim},#{s|n?vim .*\/||:#{pane_title}},#{pane_current_command}}} '
setw -g window-status-current-style 'fg=default bold'
setw -g window-status-current-format '[#I:#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{?#{==:#{pane_current_command},nvim},#{s|n?vim .*\/||:#{pane_title}},#{pane_current_command}}}]'

set -g status-left '#S'

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
bind c   new-window   -c    "#{pane_current_path}"

# ─── Plugin: tmux-resurrect ────────────────────────────
set -g @resurrect-dir "$XDG_DATA_HOME/tmux/resurrect"
set -g @resurrect-processes 'btop k9s lazygit pi ssh'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-hook-post-save-all 'sed -i "s| --cmd .*-vim-pack-dir||g; s|/etc/profiles/per-user/$USER/bin/||g; s|/nix/store/.*/bin/||g" "$(readlink -f "$XDG_DATA_HOME/tmux/resurrect/last")"'

# ─── Plugin: tmux-continuum ────────────────────────────
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# ─── TPM (non‑Nix machines only) ──────────────────────
# On Nix machines,  @nix_tmux is set and plugins come from extraConfig.
# On non‑Nix machines, copy this file to ~/.config/tmux/tmux.conf (XDG);
# TPM downloads and loads the plugins.
if-shell '[ "$(tmux show-option -gv @nix_tmux 2>/dev/null)" != "1" ]' {
  # status-right set here so continuum prepends its save script to our format
  set -g status-right '#{user}@#h  %H:%M'

  set -g @plugin 'tmux-plugins/tpm'
  set -g @plugin 'tmux-plugins/tmux-resurrect'
  set -g @plugin 'tmux-plugins/tmux-continuum'
  run '~/.tmux/plugins/tpm/tpm'
}
